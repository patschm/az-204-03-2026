apiVersion: apps/v1
kind: Deployment
metadata:
  name: deechte
spec:
  selector:
    matchLabels:
      app: deechte
      band: frontend
  template:
    metadata:
      labels:
        app: deechte
        band: frontend
    spec:
      containers:
      - name: dechet
        image: psrepoo.azurecr.io/deechte:v1
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name:  deechte
spec:
  selector:
    app:  deechte
    band: frontend
  type:  LoadBalancer
  ports:
  - protocol: TCP
    port:  80
    targetPort: 8080